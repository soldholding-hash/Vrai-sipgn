<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIPGN — Police & Gendarmerie Nationale</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#0F172A}
    .space-y-1>*+*{margin-top:.25rem}.space-y-2>*+*{margin-top:.5rem}
    .space-y-3>*+*{margin-top:.75rem}.space-y-4>*+*{margin-top:1rem}
    .space-y-5>*+*{margin-top:1.25rem}.space-y-6>*+*{margin-top:1.5rem}
    .space-x-2>*+*{margin-left:.5rem}.space-x-3>*+*{margin-left:.75rem}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#1E293B}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
    .animate-pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .animate-spin{animation:spin 1s linear infinite}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    #err{display:none;color:#f87171;padding:20px;font-family:monospace;font-size:12px;background:#1E293B;margin:20px;border-radius:8px}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="err"></div>
  <script type="module" src="/assets/index-BbWZFkiX.js"></script>
  <script>
    window.onerror=function(m,s,l,c,e){
      var d=document.getElementById('err');
      d.style.display='block';
      d.innerText='ERREUR: '+m+'\nFichier: '+s+'\nLigne: '+l;
    };
  </script>
</body>
</html>
